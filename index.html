<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fruit_memory</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff8f2;
  text-align: center;
}

.screen { display: none; }
.screen.active { display: block; }

.fruit-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  padding: 20px;
}

.fruit {
  font-size: 50px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}

#webcam {
  width: 100%;
  max-width: 400px;
}
</style>
</head>

<body>

<h1>フルーツ記憶ゲーム</h1>

<!-- 画面1 -->
<div id="start" class="screen active">
  <h2>覚えてください</h2>
  <div id="fruits" class="fruit-grid"></div>
  <button onclick="goNext()">次へ</button>
</div>

<!-- 画面2 -->
<div id="question" class="screen">
  <h2>このフルーツはありましたか？</h2>
  <div id="qfruit" style="font-size:80px;"></div>

  <video id="webcam" autoplay playsinline></video>

  <p id="status">カメラ準備中...</p>

  <button onclick="answer(true)">はい</button>
  <button onclick="answer(false)">いいえ</button>
</div>

<!-- 画面3 -->
<div id="result" class="screen">
  <h2 id="resultText"></h2>
  <button onclick="startGame()">もう一度</button>
</div>

<script type="module">
import {
  PoseLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

// ===== フルーツ =====
const fruits = ["🍎","🍊","🍌","🍑","🍓","🍇"];

let shown = [];
let correct;
let pose;
let webcam = document.getElementById("webcam");

// ===== 初期 =====
startGame();

function startGame(){
  show("start");

  shown = shuffle(fruits).slice(0,5);

  const area = document.getElementById("fruits");
  area.innerHTML = "";
  shown.forEach(f=>{
    const div = document.createElement("div");
    div.className="fruit";
    div.textContent=f;
    area.appendChild(div);
  });
}

// ===== 次へ =====
function goNext(){
  show("question");

  const target = fruits[Math.floor(Math.random()*fruits.length)];
  document.getElementById("qfruit").textContent = target;

  correct = shown.includes(target);

  startCamera();
}

// ===== 画面切替 =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ===== 回答 =====
function answer(ans){
  const res = (ans === correct);
  document.getElementById("resultText").textContent = res ? "正解！" : "不正解";
  show("result");
}

// ===== カメラ =====
async function startCamera(){

  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  webcam.srcObject = stream;

  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
  );

  pose = await PoseLandmarker.createFromOptions(vision,{
    baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task"
    },
    runningMode:"VIDEO"
  });

  detect();
}

// ===== 手検出 =====
function detect(){
  const res = pose.detectForVideo(webcam, performance.now());

  if(res.landmarks.length>0){
    const lm = res.landmarks[0];

    const leftShoulder = lm[11];
    const rightShoulder = lm[12];
    const leftWrist = lm[15];
    const rightWrist = lm[16];

    if(rightWrist.y < rightShoulder.y){
      document.getElementById("status").textContent="右手→はい";
      answer(true);
      return;
    }

    if(leftWrist.y < leftShoulder.y){
      document.getElementById("status").textContent="左手→いいえ";
      answer(false);
      return;
    }
  }

  requestAnimationFrame(detect);
}

// ===== シャッフル =====
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// Enterキー
document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") goNext();
});
</script>

</body>
</html>
